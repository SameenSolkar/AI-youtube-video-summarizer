<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <title>YouTube Summarizer</title>
  <link rel="preconnect" href="https://generativelanguage.googleapis.com">
  <link rel="stylesheet" href="./css/popup.css">
</head>

<body>

  <div class="main-container">
    <h3>Summarize a YouTube video</h3>
      <div class="row">
        <input id="url" type="url" placeholder="Paste YouTube URL (https://...)" />
      </div>
  
      <div class="tweak">
        <label for="style">Style:</label>
        <select id="style">
          <option value="tldr">Short TL;DR</option>
          <option value="bullets">Bullets + timestamps</option>
          <option value="chapters">Chapterized summary</option>
          <option value="study">Study notes (key points + quiz)</option>
        </select>
      </div>
  
      <button id="summarize" style="margin-top:8px">Summarize</button>
    <div class="hint">Set your Gemini API key in the extension’s Options page.</div>

    <p id="out"></p>
  </div>

  <script src="./js/popup.js"></script>
</body>

</html>
