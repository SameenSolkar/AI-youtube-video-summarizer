<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Gemini API Key</title>
    <link rel="stylesheet" href="./css/options.css">
  </head>
  <body>
    <h2 id="title">Gemini API Key</h2>
    <input id="key" type="password" placeholder="Paste gemini key here" />

      ⚠️ Your API key is stored locally in your browser. Never share your browser profile or sync data with untrusted parties.
    </p>
    <p id="message"></p>
    <button id="save">Save</button>
    <script src="./js/options.js"></script>
  </body>
</html>
